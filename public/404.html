<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Lei Xu</title>
    <script>
      // GitHub Pages SPA redirect trick
      // Redirects 404s back to index.html with the path encoded as a query param
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host + l.pathname.split('/').slice(0, 1).join('/') +
        '/?/' + l.pathname.slice(1) + (l.search ? '&' + l.search.slice(1) : '') + l.hash
      );
    </script>
  </head>
  <body></body>
</html>
